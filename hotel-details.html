<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta

    content="View hotel details, amenities, contact information, WhatsApp access, and image gallery for each EasyStayHub property."

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"

  <link rel="icon" type="image/png" sizes="32x32" href="assets/branding/logo-32.png">

<body>
  <div class="site-shell">

        <nav class="nav nav--static">
          <a href="index.html#rooms">Hotels</a>
          <a href="index.html#events">Events</a>
